<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>


    <div class="dashboard">

        <aside class="sidebar">

            <div class="logo">
                <h2>PharmaCare</h2>
            </div>

            <nav>

                <a href="dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>

                <a href="inventory.html">
                    <i class="fa-solid fa-capsules"></i>
                    <span>Medicines</span>
                </a>

                <a href="suppliers.html" class="active">
                    <i class="fa-solid fa-truck"></i>
                    <span>Suppliers</span>
                </a>

                <a href="sales.html">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>Sales</span>
                </a>

                <a href="reports.html">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Reports</span>
                </a>

            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </button>
            </div>

        </aside>

        <main class="main">

            <div class="top-header">

                <h1>Suppliers</h1>

                <div class="header-actions">

                    <button class="icon-btn notification-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge" id="notificationCount">0</span>
                    </button>

                    <div class="profile-wrapper">

                        <div class="profile-card" id="profileCard">

                            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="profile">

                            <div class="profile-info">
                                <span>Hello,</span>
                                <h4 id="userName"></h4>
                            </div>

                            <i class="fa-solid fa-chevron-down"></i>

                        </div>

                        <div class="profile-dropdown" id="profileDropdown">

                            <a href="#">
                                <i class="fa-solid fa-user"></i>
                                My Profile
                            </a>

                            <a href="#">
                                <i class="fa-solid fa-gear"></i>
                                Settings
                            </a>

                            <a href="#">
                                <i class="fa-solid fa-bell"></i>
                                Notifications
                            </a>

                            <button id="logoutBtn">
                                <i class="fa-solid fa-right-from-bracket"></i>
                                Logout
                            </button>

                        </div>

                    </div>

                </div>

            </div>
            <div class="suppliers-page">
                <div class="headerSupplier">
                    <p>Manage suppliers, stock levels and expiry dates</p>
                    <a href="./addSuppliers.html">+ Add Supplier</a>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <h2 id="totalSuppliers">0</h2>
                        <p>Total Suppliers</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="activeSuppliers">0</h2>
                        <p>Active Suppliers</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="totalMedicines">0</h2>
                        <p>Medicines</p>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search supplier...">
                </div>
                <table class="suppliers-table">
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="supplierTable"></tbody>
                </table>
                <div id="suppliersGrid" class="suppliers-grid"></div>
            </div>
            <div id="supplierDeleteModal" class="supplier-modal">
                <div class="supplier-modal-content">
                    <h3>Delete Supplier</h3>

                    <p id="supplierDeleteMessage"></p>

                    <div class="supplier-modal-actions">
                        <button id="supplierCancelDelete">
                            Cancel
                        </button>

                        <button id="supplierConfirmDelete">
                            Delete
                        </button>
                    </div>
                </div>
            </div>
            <script src="./script/suppliers.js"></script>

</body>

</html>
