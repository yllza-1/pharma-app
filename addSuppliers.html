<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="add-supplier-page">

        <div class="page-header">

            <h1>Add New Supplier</h1>

            <p>
                Register a new supplier and keep your pharmacy network organized.
            </p>

            <a href="suppliers.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Suppliers
            </a>

        </div>

        <form id="supplierForm">
            <h2>Supplier Information</h2>

            <input type="text" id="company" placeholder="Company Name" required>
            <input type="text" id="phone" placeholder="Phone Number" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="text" id="address" placeholder="Company Address" required>

            <button type="submit">
                <i class="fa-solid fa-plus"></i>
                Add Supplier
            </button>
        </form>

    </div>
    <script src="./script/addSupplier.js"></script>
</body>

</html>
